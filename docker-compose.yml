services:
  kdc:
    build:
      context: ./kdc
    container_name: hb-kdc
    hostname: kdc.hadoop.local
    environment:
      KRB5_REALM: EXAMPLE.COM
      KRB5_KDC: kdc.hadoop.local
      KRB5_ADMIN_SERVER: kdc.hadoop.local
      KRB5_ADMIN_PASSWORD: admin123
      KRB5_TALEND_PASSWORD: talend123
    volumes:
      - kdc-db:/var/lib/krb5kdc
      - shared-keytabs:/keytabs
    ports:
      - "88:88"
      - "88:88/udp"
      - "749:749"
    healthcheck:
      test: ["CMD-SHELL", "kadmin.local -q 'listprincs' >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:14
    container_name: hb-postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive123
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=md5"
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 10

  openldap:
    image: osixia/openldap:1.5.0
    container_name: hb-openldap
    hostname: openldap.hadoop.local
    environment:
      LDAP_ORGANISATION: Example Lab
      LDAP_DOMAIN: example.com
      LDAP_ADMIN_PASSWORD: admin123
      LDAP_TLS: "false"
      LDAP_REMOVE_CONFIG_AFTER_SETUP: "false"
    volumes:
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "ldapsearch -x -H ldap://127.0.0.1:389 -D 'cn=admin,dc=example,dc=com' -w admin123 -b 'dc=example,dc=com' '(uid=admin)' uid >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hb-namenode
    hostname: namenode.hadoop.local
    environment:
      CLUSTER_NAME: hive3-kerb
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_permissions_enabled: "false"
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - namenode-data:/hadoop/dfs/name

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: hb-datanode
    hostname: datanode.hadoop.local
    depends_on:
      - namenode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      HDFS_CONF_dfs_datanode_use_datanode_hostname: "true"
      SERVICE_PRECONDITION: namenode:9870
    volumes:
      - datanode-data:/hadoop/dfs/data

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: hb-resourcemanager
    hostname: resourcemanager.hadoop.local
    depends_on:
      - namenode
      - datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      SERVICE_PRECONDITION: namenode:8020 datanode:9864
    ports:
      - "8088:8088"

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: hb-nodemanager
    hostname: nodemanager.hadoop.local
    depends_on:
      - resourcemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
      SERVICE_PRECONDITION: resourcemanager:8088

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: hb-historyserver
    hostname: historyserver.hadoop.local
    depends_on:
      - namenode
      - datanode
      - resourcemanager
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
      MAPRED_CONF_mapreduce_jobhistory_address: historyserver:10020
      MAPRED_CONF_mapreduce_jobhistory_webapp_address: historyserver:19888
      SERVICE_PRECONDITION: namenode:8020 datanode:9864 resourcemanager:8088
    ports:
      - "19888:19888"

  hdfs-init:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: hb-hdfs-init
    depends_on:
      - namenode
      - datanode
    environment:
      CORE_CONF_fs_defaultFS: hdfs://namenode:8020
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -e
        # Preserve the container PATH; using ${PATH} here makes Compose inject the host PATH.
        export PATH="/opt/hadoop-3.2.1/bin:$${PATH}"
        for i in $(seq 1 40); do
          hdfs dfs -test -e / && break
          echo "Waiting for HDFS..."
          sleep 3
        done
        hdfs dfs -mkdir -p /user/hive/warehouse /tmp/hive
        hdfs dfs -chmod -R 777 /user/hive /tmp/hive
        echo "HDFS bootstrap done."
    restart: "no"

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hb-hive-metastore
    hostname: metastore.hadoop.local
    depends_on:
      postgres:
        condition: service_healthy
      hdfs-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "/hive_custom_conf/metastore-entrypoint.sh"]
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123
        -Dhive.metastore.uris=thrift://hive-metastore:9083
        -Dhadoop.security.authentication=kerberos
        -Dfs.defaultFS=file:///
        -Dhive.exec.scratchdir=file:///tmp/hive
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
    volumes:
      - ./hive-conf:/hive_custom_conf:ro
      - ./.data/warehouse:/tmp/warehouse
    ports:
      - "9083:9083"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '(echo > /dev/tcp/127.0.0.1/9083) >/dev/null 2>&1'"]
      interval: 10s
      timeout: 5s
      retries: 20

  hive-server2:
    image: apache/hive:3.1.3
    container_name: hb-hive-server2
    hostname: hiveserver2.hadoop.local
    depends_on:
      hive-metastore:
        condition: service_healthy
      kdc:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123
        -Dhive.metastore.uris=thrift://hive-metastore:9083
        -Dmetastore.event.db.notification.api.auth=false
        -Dhive.metastore.event.db.notification.api.auth=false
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
    volumes:
      - ./hive-conf:/hive_custom_conf:ro
      - ./hive-conf/hive-site.hs2-kerberos.xml:/hive_custom_conf/hive-site.xml:ro
      - ./hive-conf/core-site.kerberos.xml:/hive_custom_conf/core-site.xml:ro
      - ./datasets:/datasets:ro
      - ./conf/krb5.conf:/etc/krb5.conf:ro
      - shared-keytabs:/keytabs:ro
      - ./.data/warehouse:/tmp/warehouse
    ports:
      - "10000:10000"
      - "10002:10002"
    entrypoint:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/warehouse
        chmod 1777 /tmp/warehouse
        mkdir -p /tmp/hive
        chmod 1777 /tmp/hive
        exec /entrypoint.sh

  hive-server2-open:
    image: apache/hive:3.1.3
    container_name: hb-hive-server2-open
    hostname: hiveserver2-open.hadoop.local
    depends_on:
      hive-metastore:
        condition: service_healthy
      openldap:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
      IS_RESUME: "true"
      SERVICE_OPTS: >
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive123
        -Dhive.metastore.uris=thrift://hive-metastore:9083
      HIVE_CUSTOM_CONF_DIR: /hive_custom_conf
    volumes:
      - ./hive-conf:/hive_custom_conf:ro
      - ./hive-conf/hive-site.ldap.xml:/hive_custom_conf/hive-site.xml:ro
      - ./datasets:/datasets:ro
      - ./.data/warehouse:/tmp/warehouse
    ports:
      - "10001:10000"
      - "10003:10002"
    entrypoint:
      - /bin/bash
      - -lc
      - |
        mkdir -p /tmp/warehouse
        chmod 1777 /tmp/warehouse
        mkdir -p /tmp/hive
        chmod 1777 /tmp/hive
        exec /entrypoint.sh

  impala-statestored:
    image: apache/impala:4.5.0-statestored
    container_name: hb-impala-statestored
    hostname: statestored.hadoop.local
    depends_on:
      kdc:
        condition: service_healthy
    command:
      - /opt/impala/bin/statestored
      - -log_dir=/opt/impala/logs
      - -principal=impala/172.30.0.14@EXAMPLE.COM
      - -be_principal=impala/172.30.0.14@EXAMPLE.COM
      - -keytab_file=/keytabs/impala.service.keytab
      - -spnego_keytab_file=/keytabs/http.service.keytab
      - -skip_internal_kerberos_auth=false
      - -skip_external_kerberos_auth=false
    volumes:
      - ./conf/krb5.conf:/etc/krb5.conf:ro
      - shared-keytabs:/keytabs:ro
    networks:
      default:
        ipv4_address: 172.30.0.14

  impala-catalogd:
    image: apache/impala:4.5.0-catalogd
    container_name: hb-impala-catalogd
    hostname: catalogd.hadoop.local
    depends_on:
      impala-statestored:
        condition: service_started
      hive-metastore:
        condition: service_started
      kdc:
        condition: service_healthy
    command:
      - /opt/impala/bin/catalogd
      - -log_dir=/opt/impala/logs
      - -abort_on_config_error=false
      - -state_store_host=172.30.0.14
      - -catalog_topic_mode=minimal
      - -hms_event_polling_interval_s=2
      - -principal=impala/172.30.0.16@EXAMPLE.COM
      - -be_principal=impala/172.30.0.16@EXAMPLE.COM
      - -keytab_file=/keytabs/impala.service.keytab
      - -spnego_keytab_file=/keytabs/http.service.keytab
      - -skip_internal_kerberos_auth=false
      - -skip_external_kerberos_auth=false
    volumes:
      - ./conf/krb5.conf:/etc/krb5.conf:ro
      - ./hive-conf/core-site.xml:/opt/impala/conf/core-site.xml:ro
      - ./hive-conf/hdfs-site.xml:/opt/impala/conf/hdfs-site.xml:ro
      - ./hive-conf/hive-site.xml:/opt/impala/conf/hive-site.xml:ro
      - shared-keytabs:/keytabs:ro
      - ./.data/warehouse:/tmp/warehouse
    networks:
      default:
        ipv4_address: 172.30.0.16

  impala-daemon:
    image: apache/impala:4.5.0-impalad_coord_exec
    container_name: hb-impala-daemon
    hostname: impala.hadoop.local
    depends_on:
      impala-statestored:
        condition: service_started
      impala-catalogd:
        condition: service_started
      namenode:
        condition: service_started
      kdc:
        condition: service_healthy
    command:
      - /opt/impala/bin/impalad
      - -log_dir=/opt/impala/logs
      - -abort_on_config_error=false
      - -state_store_host=172.30.0.14
      - -catalog_service_host=172.30.0.16
      - -catalog_topic_mode=minimal
      - -mem_limit_includes_jvm=true
      - -use_local_catalog=true
      - -principal=impala/impala.hadoop.local@EXAMPLE.COM
      - -be_principal=impala/172.30.0.17@EXAMPLE.COM
      - -keytab_file=/keytabs/impala.service.keytab
      - -spnego_keytab_file=/keytabs/http.service.keytab
      - -skip_internal_kerberos_auth=false
      - -skip_external_kerberos_auth=false
      - -server_name=impala
    volumes:
      - ./conf/krb5.conf:/etc/krb5.conf:ro
      - ./hive-conf/core-site.xml:/opt/impala/conf/core-site.xml:ro
      - ./hive-conf/hdfs-site.xml:/opt/impala/conf/hdfs-site.xml:ro
      - ./hive-conf/hive-site.xml:/opt/impala/conf/hive-site.xml:ro
      - shared-keytabs:/keytabs:ro
      - ./.data/warehouse:/tmp/warehouse
    ports:
      - "21000:21000"
      - "21050:21050"
      - "25000:25000"
    networks:
      default:
        ipv4_address: 172.30.0.17

  impala-statestored-open:
    image: apache/impala:4.5.0-statestored
    container_name: hb-impala-statestored-open
    hostname: statestored-open.hadoop.local
    command:
      - /opt/impala/bin/statestored
      - -log_dir=/opt/impala/logs
      - -use_resolved_hostname=true
      - -skip_internal_kerberos_auth=true
      - -skip_external_kerberos_auth=true

  impala-catalogd-open:
    image: apache/impala:4.5.0-catalogd
    container_name: hb-impala-catalogd-open
    hostname: catalogd-open.hadoop.local
    depends_on:
      impala-statestored-open:
        condition: service_started
      hive-metastore:
        condition: service_started
    command:
      - /opt/impala/bin/catalogd
      - -log_dir=/opt/impala/logs
      - -abort_on_config_error=false
      - -state_store_host=impala-statestored-open
      - -catalog_topic_mode=minimal
      - -hms_event_polling_interval_s=2
      - -use_resolved_hostname=true
      - -skip_internal_kerberos_auth=true
      - -skip_external_kerberos_auth=true
    volumes:
      - ./hive-conf/core-site.xml:/opt/impala/conf/core-site.xml:ro
      - ./hive-conf/hdfs-site.xml:/opt/impala/conf/hdfs-site.xml:ro
      - ./hive-conf/hive-site.no-kerberos.xml:/opt/impala/conf/hive-site.xml:ro
      - ./.data/warehouse:/tmp/warehouse

  impala-daemon-open:
    image: apache/impala:4.5.0-impalad_coord_exec
    container_name: hb-impala-daemon-open
    hostname: impala-open.hadoop.local
    depends_on:
      impala-statestored-open:
        condition: service_started
      impala-catalogd-open:
        condition: service_started
      namenode:
        condition: service_started
      openldap:
        condition: service_healthy
    command:
      - /opt/impala/bin/impalad
      - -log_dir=/opt/impala/logs
      - -abort_on_config_error=false
      - -state_store_host=impala-statestored-open
      - -catalog_service_host=impala-catalogd-open
      - -catalog_topic_mode=minimal
      - -mem_limit_includes_jvm=true
      - -use_local_catalog=true
      - -use_resolved_hostname=true
      - -skip_internal_kerberos_auth=true
      - -skip_external_kerberos_auth=false
      - -enable_ldap_auth=true
      - -ldap_uri=ldap://openldap:389
      - -ldap_bind_pattern=uid=#UID,ou=people,dc=example,dc=com
      - -ldap_passwords_in_clear_ok=true
      - -server_name=impalaopen
    volumes:
      - ./hive-conf/core-site.xml:/opt/impala/conf/core-site.xml:ro
      - ./hive-conf/hdfs-site.xml:/opt/impala/conf/hdfs-site.xml:ro
      - ./hive-conf/hive-site.no-kerberos.xml:/opt/impala/conf/hive-site.xml:ro
      - ./.data/warehouse:/tmp/warehouse
    ports:
      - "21001:21000"
      - "21051:21050"
      - "25001:25000"

  kerberos-client:
    build:
      context: ./kerberos-client
    image: hb-kerberos-client:local
    container_name: hb-kerberos-client
    hostname: client.hadoop.local
    depends_on:
      kdc:
        condition: service_healthy
    volumes:
      - ./conf/krb5.conf:/etc/krb5.conf:ro
      - shared-keytabs:/keytabs:ro

  dataset-seed:
    build:
      context: ./kerberos-client
    image: hb-kerberos-client:local
    container_name: hb-dataset-seed
    depends_on:
      hive-server2-open:
        condition: service_started
      impala-daemon-open:
        condition: service_started
      impala-daemon:
        condition: service_started
      kerberos-client:
        condition: service_started
    volumes:
      - ./conf/krb5.conf:/etc/krb5.conf:ro
      - ./datasets:/datasets:ro
      - ./scripts/seed-demo-data.sh:/seed-demo-data.sh:ro
      - shared-keytabs:/keytabs:ro
    command: ["/bin/bash", "/seed-demo-data.sh"]
    restart: "no"

volumes:
  kdc-db:
  postgres-data:
  shared-keytabs:
  namenode-data:
  datanode-data:

networks:
  default:
    name: hbnet
    ipam:
      config:
        - subnet: 172.30.0.0/24
          ip_range: 172.30.0.128/25
